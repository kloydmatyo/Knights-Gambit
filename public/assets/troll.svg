<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Troll - Massive, club, regenerating -->
  <g id="troll">
    <!-- Head -->
    <rect x="10" y="2" width="12" height="8" fill="#556B2F"/>
    <!-- Hair/moss -->
    <rect x="8" y="2" width="16" height="3" fill="#228B22"/>
    <!-- Eyes -->
    <rect x="13" y="5" width="2" height="2" fill="#FF4500"/>
    <rect x="17" y="5" width="2" height="2" fill="#FF4500"/>
    <!-- Body -->
    <rect x="6" y="10" width="20" height="14" fill="#556B2F"/>
    <rect x="8" y="12" width="16" height="10" fill="#6B8E23"/>
    <!-- Arms -->
    <rect x="4" y="12" width="4" height="10" fill="#556B2F"/>
    <rect x="24" y="12" width="4" height="10" fill="#556B2F"/>
    <!-- Legs -->
    <rect x="8" y="24" width="6" height="6" fill="#556B2F"/>
    <rect x="18" y="24" width="6" height="6" fill="#556B2F"/>
    <!-- Large club -->
    <rect x="28" y="4" width="3" height="16" fill="#8B4513"/>
    <rect x="27" y="2" width="5" height="4" fill="#654321"/>
    <!-- Claws -->
    <rect x="2" y="20" width="2" height="3" fill="#FFFFFF"/>
    <rect x="3" y="18" width="2" height="3" fill="#FFFFFF"/>
    <!-- Feet -->
    <rect x="6" y="30" width="8" height="2" fill="#654321"/>
    <rect x="18" y="30" width="8" height="2" fill="#654321"/>
  </g>
</svg>