<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Assassin - Black hood, dual daggers, stealthy pose -->
  <g id="assassin">
    <!-- Hood -->
    <rect x="8" y="2" width="16" height="10" fill="#000000"/>
    <rect x="10" y="4" width="12" height="8" fill="#2F2F2F"/>
    <!-- Face (partially hidden) -->
    <rect x="14" y="8" width="4" height="2" fill="#FFDBAC"/>
    <rect x="15" y="9" width="1" height="1" fill="#FF0000"/>
    <rect x="18" y="9" width="1" height="1" fill="#FF0000"/>
    <!-- Body -->
    <rect x="10" y="12" width="12" height="12" fill="#000000"/>
    <rect x="12" y="14" width="8" height="8" fill="#2F2F2F"/>
    <!-- Arms -->
    <rect x="8" y="14" width="4" height="6" fill="#000000"/>
    <rect x="20" y="14" width="4" height="6" fill="#000000"/>
    <!-- Legs -->
    <rect x="10" y="24" width="4" height="6" fill="#000000"/>
    <rect x="18" y="24" width="4" height="6" fill="#000000"/>
    <!-- Dual daggers -->
    <rect x="6" y="12" width="2" height="6" fill="#C0C0C0"/>
    <rect x="24" y="12" width="2" height="6" fill="#C0C0C0"/>
    <rect x="5" y="11" width="4" height="1" fill="#8B4513"/>
    <rect x="23" y="11" width="4" height="1" fill="#8B4513"/>
    <!-- Feet -->
    <rect x="8" y="30" width="6" height="2" fill="#000000"/>
    <rect x="18" y="30" width="6" height="2" fill="#000000"/>
  </g>
</svg>