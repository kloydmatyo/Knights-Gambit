<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="32" viewBox="0 0 128 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Goblin - Small, green, sneaky -->
  <g id="goblin" transform="translate(0,0)">
    <!-- Head -->
    <rect x="12" y="6" width="8" height="6" fill="#228B22"/>
    <!-- Large ears -->
    <rect x="10" y="8" width="2" height="4" fill="#228B22"/>
    <rect x="20" y="8" width="2" height="4" fill="#228B22"/>
    <!-- Eyes -->
    <rect x="14" y="8" width="2" height="2" fill="#FF0000"/>
    <rect x="18" y="8" width="2" height="2" fill="#FF0000"/>
    <!-- Body -->
    <rect x="10" y="12" width="12" height="10" fill="#32CD32"/>
    <rect x="12" y="14" width="8" height="6" fill="#228B22"/>
    <!-- Arms -->
    <rect x="8" y="14" width="4" height="6" fill="#228B22"/>
    <rect x="20" y="14" width="4" height="6" fill="#228B22"/>
    <!-- Legs -->
    <rect x="12" y="22" width="3" height="6" fill="#228B22"/>
    <rect x="17" y="22" width="3" height="6" fill="#228B22"/>
    <!-- Dagger -->
    <rect x="6" y="12" width="2" height="6" fill="#C0C0C0"/>
    <rect x="5" y="11" width="4" height="1" fill="#8B4513"/>
    <!-- Feet -->
    <rect x="10" y="28" width="5" height="2" fill="#654321"/>
    <rect x="17" y="28" width="5" height="2" fill="#654321"/>
  </g>

  <!-- Orc - Large, brutish, tusks -->
  <g id="orc" transform="translate(32,0)">
    <!-- Head -->
    <rect x="10" y="4" width="12" height="8" fill="#8FBC8F"/>
    <!-- Tusks -->
    <rect x="12" y="10" width="2" height="3" fill="#FFFFFF"/>
    <rect x="18" y="10" width="2" height="3" fill="#FFFFFF"/>
    <!-- Eyes -->
    <rect x="13" y="6" width="2" height="2" fill="#FF0000"/>
    <rect x="17" y="6" width="2" height="2" fill="#FF0000"/>
    <!-- Body -->
    <rect x="8" y="12" width="16" height="12" fill="#8B4513"/>
    <rect x="10" y="14" width="12" height="8" fill="#A0522D"/>
    <!-- Arms -->
    <rect x="6" y="14" width="4" height="8" fill="#8FBC8F"/>
    <rect x="22" y="14" width="4" height="8" fill="#8FBC8F"/>
    <!-- Legs -->
    <rect x="10" y="24" width="4" height="6" fill="#8FBC8F"/>
    <rect x="18" y="24" width="4" height="6" fill="#8FBC8F"/>
    <!-- War axe -->
    <rect x="26" y="8" width="4" height="4" fill="#C0C0C0"/>
    <rect x="28" y="12" width="2" height="8" fill="#8B4513"/>
    <!-- Feet -->
    <rect x="8" y="30" width="6" height="2" fill="#654321"/>
    <rect x="18" y="30" width="6" height="2" fill="#654321"/>
  </g>

  <!-- Skeleton - Undead, bones, spear -->
  <g id="skeleton" transform="translate(64,0)">
    <!-- Skull -->
    <rect x="12" y="4" width="8" height="6" fill="#F5F5DC"/>
    <!-- Eye sockets -->
    <rect x="14" y="6" width="2" height="2" fill="#000000"/>
    <rect x="18" y="6" width="2" height="2" fill="#000000"/>
    <!-- Jaw -->
    <rect x="14" y="9" width="4" height="2" fill="#F5F5DC"/>
    <!-- Ribcage -->
    <rect x="10" y="11" width="12" height="8" fill="#F5F5DC"/>
    <rect x="12" y="13" width="8" height="1" fill="#DCDCDC"/>
    <rect x="12" y="15" width="8" height="1" fill="#DCDCDC"/>
    <rect x="12" y="17" width="8" height="1" fill="#DCDCDC"/>
    <!-- Arms (bones) -->
    <rect x="8" y="13" width="4" height="2" fill="#F5F5DC"/>
    <rect x="20" y="13" width="4" height="2" fill="#F5F5DC"/>
    <rect x="8" y="16" width="4" height="2" fill="#F5F5DC"/>
    <rect x="20" y="16" width="4" height="2" fill="#F5F5DC"/>
    <!-- Legs (bones) -->
    <rect x="12" y="19" width="2" height="8" fill="#F5F5DC"/>
    <rect x="18" y="19" width="2" height="8" fill="#F5F5DC"/>
    <rect x="12" y="23" width="2" height="2" fill="#DCDCDC"/>
    <rect x="18" y="23" width="2" height="2" fill="#DCDCDC"/>
    <!-- Spear -->
    <rect x="26" y="6" width="2" height="16" fill="#8B4513"/>
    <rect x="25" y="4" width="4" height="3" fill="#C0C0C0"/>
    <!-- Feet -->
    <rect x="10" y="27" width="6" height="3" fill="#F5F5DC"/>
    <rect x="16" y="27" width="6" height="3" fill="#F5F5DC"/>
  </g>

  <!-- Troll - Massive, club, regenerating -->
  <g id="troll" transform="translate(96,0)">
    <!-- Head -->
    <rect x="10" y="2" width="12" height="8" fill="#556B2F"/>
    <!-- Hair/moss -->
    <rect x="8" y="2" width="16" height="3" fill="#228B22"/>
    <!-- Eyes -->
    <rect x="13" y="5" width="2" height="2" fill="#FF4500"/>
    <rect x="17" y="5" width="2" height="2" fill="#FF4500"/>
    <!-- Body -->
    <rect x="6" y="10" width="20" height="14" fill="#556B2F"/>
    <rect x="8" y="12" width="16" height="10" fill="#6B8E23"/>
    <!-- Arms -->
    <rect x="4" y="12" width="4" height="10" fill="#556B2F"/>
    <rect x="24" y="12" width="4" height="10" fill="#556B2F"/>
    <!-- Legs -->
    <rect x="8" y="24" width="6" height="6" fill="#556B2F"/>
    <rect x="18" y="24" width="6" height="6" fill="#556B2F"/>
    <!-- Large club -->
    <rect x="28" y="4" width="3" height="16" fill="#8B4513"/>
    <rect x="27" y="2" width="5" height="4" fill="#654321"/>
    <!-- Claws -->
    <rect x="2" y="20" width="2" height="3" fill="#FFFFFF"/>
    <rect x="3" y="18" width="2" height="3" fill="#FFFFFF"/>
    <!-- Feet -->
    <rect x="6" y="30" width="8" height="2" fill="#654321"/>
    <rect x="18" y="30" width="8" height="2" fill="#654321"/>
  </g>
</svg>