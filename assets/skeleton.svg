<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Skeleton - Undead, bones, spear -->
  <g id="skeleton">
    <!-- Skull -->
    <rect x="12" y="4" width="8" height="6" fill="#F5F5DC"/>
    <!-- Eye sockets -->
    <rect x="14" y="6" width="2" height="2" fill="#000000"/>
    <rect x="18" y="6" width="2" height="2" fill="#000000"/>
    <!-- Jaw -->
    <rect x="14" y="9" width="4" height="2" fill="#F5F5DC"/>
    <!-- Ribcage -->
    <rect x="10" y="11" width="12" height="8" fill="#F5F5DC"/>
    <rect x="12" y="13" width="8" height="1" fill="#DCDCDC"/>
    <rect x="12" y="15" width="8" height="1" fill="#DCDCDC"/>
    <rect x="12" y="17" width="8" height="1" fill="#DCDCDC"/>
    <!-- Arms (bones) -->
    <rect x="8" y="13" width="4" height="2" fill="#F5F5DC"/>
    <rect x="20" y="13" width="4" height="2" fill="#F5F5DC"/>
    <rect x="8" y="16" width="4" height="2" fill="#F5F5DC"/>
    <rect x="20" y="16" width="4" height="2" fill="#F5F5DC"/>
    <!-- Legs (bones) -->
    <rect x="12" y="19" width="2" height="8" fill="#F5F5DC"/>
    <rect x="18" y="19" width="2" height="8" fill="#F5F5DC"/>
    <rect x="12" y="23" width="2" height="2" fill="#DCDCDC"/>
    <rect x="18" y="23" width="2" height="2" fill="#DCDCDC"/>
    <!-- Spear -->
    <rect x="26" y="6" width="2" height="16" fill="#8B4513"/>
    <rect x="25" y="4" width="4" height="3" fill="#C0C0C0"/>
    <!-- Feet -->
    <rect x="10" y="27" width="6" height="3" fill="#F5F5DC"/>
    <rect x="16" y="27" width="6" height="3" fill="#F5F5DC"/>
  </g>
</svg>