<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Goblin - Small, green, sneaky -->
  <g id="goblin">
    <!-- Head -->
    <rect x="12" y="6" width="8" height="6" fill="#228B22"/>
    <!-- Large ears -->
    <rect x="10" y="8" width="2" height="4" fill="#228B22"/>
    <rect x="20" y="8" width="2" height="4" fill="#228B22"/>
    <!-- Eyes -->
    <rect x="14" y="8" width="2" height="2" fill="#FF0000"/>
    <rect x="18" y="8" width="2" height="2" fill="#FF0000"/>
    <!-- Body -->
    <rect x="10" y="12" width="12" height="10" fill="#32CD32"/>
    <rect x="12" y="14" width="8" height="6" fill="#228B22"/>
    <!-- Arms -->
    <rect x="8" y="14" width="4" height="6" fill="#228B22"/>
    <rect x="20" y="14" width="4" height="6" fill="#228B22"/>
    <!-- Legs -->
    <rect x="12" y="22" width="3" height="6" fill="#228B22"/>
    <rect x="17" y="22" width="3" height="6" fill="#228B22"/>
    <!-- Dagger -->
    <rect x="6" y="12" width="2" height="6" fill="#C0C0C0"/>
    <rect x="5" y="11" width="4" height="1" fill="#8B4513"/>
    <!-- Feet -->
    <rect x="10" y="28" width="5" height="2" fill="#654321"/>
    <rect x="17" y="28" width="5" height="2" fill="#654321"/>
  </g>
</svg>